name: "Install dependencies"
description: "Prepare repository and all dependencies"

runs:
  using: "composite"
  steps:
    - name: Set up foundry
      uses: foundry-rs/foundry-toolchain@82dee4ba654bd2146511f85f0d013af94670c4de # v1
      with:
        # Pinned (was `nightly`): anvil must match the version that generated
        # test/src/_generated/anvil.json — a moving nightly rejects old state
        # dumps (SerializableTransactionType parse error) and 400s the harness.
        version: v1.7.1

    - name: Set up pnpm
      uses: wevm/actions/.github/actions/pnpm@f7ad7f00e16e73322562922c241f21f0c7ffbbec # main
      with:
        node-version: 23.9.0
