name: Verify
on:
  workflow_call:

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Clone repository
        uses: actions/checkout@v5
        with:
          submodules: 'recursive'

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Audit dependencies
        # 378 vulnerabilities inherited from the porto-rise dependency tree
        # (red on rise's own CI too). Non-blocking until a dep-hygiene pass;
        # keep the report visible in the job log.
        continue-on-error: true
        run: pnpm audit

      - name: Check code
        run: pnpm dlx @biomejs/biome check . --error-on-warnings

      - name: Check types
        run: |
          pnpm --filter ui prepare
          pnpm --filter ui build
          pnpm check:types

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Clone repository
        uses: actions/checkout@v5
        with:
          submodules: 'recursive'

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Build
        run: pnpm build

      - name: Check build
        run: pnpm check:build

      - name: Check for unused files, dependencies, and exports
        run: pnpm check:knip

      - name: Check size
        run: pnpm check:size

  test:
    name: Test
    uses: ./.github/workflows/test.yml
    secrets: inherit
