name: Main
on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    uses: ./.github/workflows/verify.yml
    secrets: inherit

  extension:
    name: Extension
    uses: ./.github/workflows/extension.yml
    secrets: inherit

  # Dry-run publish gate (exec-plan-porto-fork.md Slice 5). Always runs; proves
  # the package builds and packs its published shape (dist + src) BEFORE the real
  # publish is ever armed via ENABLE_PUBLISH. No registry write happens here.
  publish-dry-run:
    name: Publish (dry-run)
    needs: [verify]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Clone repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v5
        with:
          submodules: 'recursive'

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Build dist + apply publish trim
        run: |
          pnpm build:dist
          pnpm tsx ./scripts/prepublish:pre.ts

      - name: Pack and verify tarball contains dist + src
        run: |
          npm pack --ignore-scripts
          tgz="$(ls oportet-*.tgz)"
          version="$(node -p "require('./package.json').version")"
          dist="$(tar tzf "$tgz" | grep -c 'package/dist/')"
          src="$(tar tzf "$tgz" | grep -c 'package/src/')"
          echo "oportet@$version -> $dist dist file(s) + $src src file(s)"
          test "$dist" -gt 0 || { echo '::error::published tarball is missing dist/'; exit 1; }
          test "$src" -gt 0 || { echo '::error::published tarball is missing src/'; exit 1; }

  changesets:
    name: Changesets
    needs: [verify, extension]
    # Publishing stays off until the npm OIDC / trusted-publisher setup lands
    # (exec-plan-porto-fork.md Slice 5). Set repo variable ENABLE_PUBLISH=true to arm.
    if: vars.ENABLE_PUBLISH == 'true'
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Clone repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # 11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          # This makes Actions fetch all Git history so that Changesets can generate changelogs with the correct commits
          fetch-depth: 0
          submodules: 'recursive'

      - name: Set up pnpm
        uses: wevm/actions/.github/actions/pnpm@f7ad7f00e16e73322562922c241f21f0c7ffbbec # main

      - name: PR or publish
        id: changesets
        uses: changesets/action@06245a4e0a36c064a573d4150030f5ec548e4fcc # 06245a4e0a36c064a573d4150030f5ec548e4fcc
        with:
          title: 'chore: version packages'
          commit: 'chore: version packages'
          createGithubReleases: ${{ github.ref == 'refs/heads/main' }}
          publish: pnpm changeset:publish
          version: pnpm changeset:version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          
      - name: Update latest release with extension artifacts
        if: steps.changesets.outputs.published == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            // Get the latest release
            const { data: latestRelease } = await github.rest.repos.getLatestRelease({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            // Get artifact URL from extension job
            const artifactUrl = '${{ needs.extension.outputs.artifact-url }}';
            
            // Create extension section for release notes
            const extensionSection = [
              '\n\n### Extension',
              '\n',
              `[Download](${artifactUrl})`,
              '\n',
              '#### Setup Instructions',
              '\n',
              '1. Download the `extension.zip` asset from the link below',
              '2. Unzip the downloaded file',
              '\n',
              '##### Chrome',
              '\n',
              '3. Unzip the Chrome directory',
              '4. Open Chrome and navigate to `chrome://extensions`',
              '5. Enable `Developer Mode` in the top right corner',
              '6. Click `Load Unpacked` in the top left corner',
              '7. Select the unzipped Chrome directory',
              '8. Done!',
              '\n',
              '##### Firefox',
              '\n',
              '3. Open your browser and navigate to `about:debugging#/runtime/this-firefox`',
              '4. Click `Load Temporary Add-on...` in the top right corner',
              '5. Select the zipped Firefox directory',
              '6. Done!'
            ].join('\n');

            // Update release body (append to existing content)
            const body = (latestRelease.body || '') + extensionSection;

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: latestRelease.id,
              body
            });
      
